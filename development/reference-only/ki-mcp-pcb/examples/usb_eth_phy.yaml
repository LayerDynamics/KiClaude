# STM32 + USB 2.0 HS PHY + 100BASE-T PHY — the M3 demo target.
#
# Exercises every M3 validator:
#   * differential pair declarations (USB D±, Ethernet TX±/RX±)
#   * controlled-impedance targets (90Ω USB HS, 100Ω Ethernet)
#   * reference plane declarations for return-path validation
#   * length-match groups with explicit tolerance
#
# The geometry is set so the closed-form impedance solver in
# ki_mcp_pcb_core.signal_integrity.impedance lands within 20% of each
# declared target — CIR070 is happy.
cir_version: "0.3"
name: usb-eth-phy
description: "STM32 + USB3320 ULPI PHY + LAN8720A Ethernet PHY, 4-layer."

stackup:
  layers:
    - { name: "F.Cu",   kind: copper }
    - { name: "pp1",    kind: dielectric, material: prepreg, er: 4.3, thickness_mm: 0.21 }
    - { name: "In1.Cu", kind: copper }
    - { name: "core",   kind: dielectric, material: FR-4,    er: 4.5, thickness_mm: 1.18 }
    - { name: "In2.Cu", kind: copper }
    - { name: "pp2",    kind: dielectric, material: prepreg, er: 4.3, thickness_mm: 0.21 }
    - { name: "B.Cu",   kind: copper }
  finished_thickness_mm: 1.6
  controlled_impedance: true
  power_plane_layers: ["In1.Cu", "In2.Cu"]

outline:
  shape: rect
  width_mm: 80
  height_mm: 50

components:
  - refdes: U1
    mpn: STM32F407VGT6
    partition: digital
    decoupling_pins: ["11", "19", "28", "50", "75", "100"]

  - refdes: U2
    mpn: USB3320C-EZK-TR
    partition: digital
    decoupling_pins: ["3", "21", "28"]

  - refdes: U3
    mpn: LAN8720AI-CP-TR
    partition: digital
    decoupling_pins: ["1", "13", "23"]

  - refdes: J1
    mpn: USB4105-GF-A
    partition: digital

  - refdes: C1
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C2
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C3
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C4
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C5
    mpn: GRM21BR60J106KE19L
    value: "10uF"
    partition: digital

nets:
  # Power ────────────────────────────────────────────────────────────────
  - name: GND
    net_class: ground
    members:
      [
        "U1.10", "U1.27", "U1.49", "U1.74", "U1.99",
        "U2.6", "U2.15", "U2.20",
        "U3.4", "U3.8", "U3.14",
        "J1.1",
        "C1.2", "C2.2", "C3.2", "C4.2", "C5.2"
      ]

  - name: "3V3"
    net_class: power
    power_rail: "3V3"
    members:
      [
        "U1.11", "U1.19", "U1.28", "U1.50", "U1.75", "U1.100",
        "U2.3", "U2.21", "U2.28",
        "U3.1", "U3.13", "U3.23",
        "C1.1", "C2.1", "C3.1", "C4.1", "C5.1"
      ]

  # USB 2.0 HS — 90Ω diff pair (microstrip on F.Cu, return on In1.Cu) ───
  # Solver-tuned: w=0.35mm, s=0.33mm on 0.21mm prepreg → 90.0Ω
  - name: USB_DP
    net_class: differential
    target_impedance_ohm: 90
    diff_pair_with: USB_DM
    length_match_group: "usb_hs"
    reference_plane: "In1.Cu"
    trace_width_mm: 0.350
    trace_spacing_mm: 0.330
    members: ["U2.10", "J1.2"]
  - name: USB_DM
    net_class: differential
    target_impedance_ohm: 90
    diff_pair_with: USB_DP
    length_match_group: "usb_hs"
    reference_plane: "In1.Cu"
    trace_width_mm: 0.350
    trace_spacing_mm: 0.330
    members: ["U2.9", "J1.3"]

  # Ethernet TX± — 100Ω diff pair (w=0.285mm, s=0.30mm → 100.0Ω) ───────
  - name: ETH_TXP
    net_class: differential
    target_impedance_ohm: 100
    diff_pair_with: ETH_TXN
    length_match_group: "eth_tx"
    reference_plane: "In1.Cu"
    trace_width_mm: 0.285
    trace_spacing_mm: 0.300
    members: ["U3.20", "U1.45"]
  - name: ETH_TXN
    net_class: differential
    target_impedance_ohm: 100
    diff_pair_with: ETH_TXP
    length_match_group: "eth_tx"
    reference_plane: "In1.Cu"
    trace_width_mm: 0.285
    trace_spacing_mm: 0.300
    members: ["U3.19", "U1.46"]

  # Ethernet RX± — 100Ω diff pair ──────────────────────────────────────
  - name: ETH_RXP
    net_class: differential
    target_impedance_ohm: 100
    diff_pair_with: ETH_RXN
    length_match_group: "eth_rx"
    reference_plane: "In1.Cu"
    trace_width_mm: 0.285
    trace_spacing_mm: 0.300
    members: ["U3.21", "U1.47"]
  - name: ETH_RXN
    net_class: differential
    target_impedance_ohm: 100
    diff_pair_with: ETH_RXP
    length_match_group: "eth_rx"
    reference_plane: "In1.Cu"
    trace_width_mm: 0.285
    trace_spacing_mm: 0.300
    members: ["U3.22", "U1.48"]

  # MDIO clock + data (low-speed, no controlled-Z) ─────────────────────
  - name: MDC
    net_class: signal
    members: ["U3.16", "U1.43"]
  - name: MDIO
    net_class: signal
    members: ["U3.17", "U1.44"]

constraints:
  - kind: length_match
    targets: ["usb_hs"]
    tolerance_pct: 5.0
    note: "USB 2.0 HS D+/D- length match"
  - kind: length_match
    targets: ["eth_tx"]
    tolerance_pct: 5.0
    note: "100BASE-T TX± length match"
  - kind: length_match
    targets: ["eth_rx"]
    tolerance_pct: 5.0
    note: "100BASE-T RX± length match"
  - kind: controlled_impedance
    targets: ["USB_DP", "USB_DM"]
    value_ohm: 90.0
    tolerance_pct: 10.0
  - kind: controlled_impedance
    targets: ["ETH_TXP", "ETH_TXN", "ETH_RXP", "ETH_RXN"]
    value_ohm: 100.0
    tolerance_pct: 10.0

fab:
  name: jlcpcb
  layer_count: 4

bom_policy:
  distributors: [jlc, mouser, digikey]
  require_in_stock: true
  prefer_basic_parts: true
