# STM32 + WM8731 audio codec — the M2 demo target.
#
# Exercises every M2 validator:
#   * 4-layer FR-4 stackup with GND + 3V3 power planes
#   * partition isolation (digital MCU vs. analog codec, bridged by ferrite bead)
#   * decoupling-coverage check (both ICs declare supply pins that need bypass)
#   * length-match groups on the I2S bus
#
# Closes M2 when this board validates clean and synthesizes through to a
# fab zip via `kimp build examples/stm32_audio.yaml --route`.
cir_version: "0.2"
name: stm32-audio
description: "STM32F407 + WM8731 stereo codec, mixed-signal 4-layer."

stackup:
  layers:
    - { name: "F.Cu", kind: copper }
    - { name: "pp1", kind: dielectric, material: prepreg, er: 4.3, thickness_mm: 0.21 }
    - { name: "In1.Cu", kind: copper }
    - { name: "core", kind: dielectric, material: FR-4, er: 4.5, thickness_mm: 1.18 }
    - { name: "In2.Cu", kind: copper }
    - { name: "pp2", kind: dielectric, material: prepreg, er: 4.3, thickness_mm: 0.21 }
    - { name: "B.Cu", kind: copper }
  finished_thickness_mm: 1.6
  controlled_impedance: false
  power_plane_layers: ["In1.Cu", "In2.Cu"]

outline:
  shape: rect
  width_mm: 60
  height_mm: 40

components:
  # Digital section ────────────────────────────────────────────────────────
  - refdes: U1
    mpn: STM32F407VGT6
    partition: digital
    decoupling_pins: ["11", "19", "28", "50", "75", "100"]  # VDD pins

  - refdes: C1
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C2
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C3
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C4
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C5
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C6
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C7
    mpn: GRM21BR60J106KE19L
    value: "10uF"
    partition: digital

  # Bridge — ferrite bead between digital 3V3 and analog AVDD ─────────────
  - refdes: L1
    mpn: BLM18PG121SN1D
    is_bridge: true
    partition: power

  # Analog section ────────────────────────────────────────────────────────
  - refdes: U2
    mpn: WM8731SEDS
    partition: analog
    decoupling_pins: ["1", "23"]  # AVDD, DBVDD

  - refdes: C8
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: analog
  - refdes: C9
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: analog
  - refdes: C10
    mpn: GRM21BR60J106KE19L
    value: "10uF"
    partition: analog

nets:
  # Power ─────────────────────────────────────────────────────────────────
  - name: GND
    net_class: ground
    members:
      [
        "U1.10", "U1.27", "U1.49", "U1.74", "U1.99",
        "U2.8", "U2.22", "U2.24",
        "C1.2", "C2.2", "C3.2", "C4.2", "C5.2", "C6.2", "C7.2",
        "C8.2", "C9.2", "C10.2"
      ]

  - name: "3V3"
    net_class: power
    power_rail: "3V3"
    members:
      [
        "U1.11", "U1.19", "U1.28", "U1.50", "U1.75", "U1.100",
        "C1.1", "C2.1", "C3.1", "C4.1", "C5.1", "C6.1", "C7.1",
        "L1.1"
      ]

  - name: "AVDD"
    net_class: power
    power_rail: "AVDD"
    members:
      [
        "L1.2",
        "U2.1", "U2.23",
        "C8.1", "C9.1", "C10.1"
      ]

  # I2S audio bus — length-matched group, intentional digital→analog bus ──
  - name: I2S_BCLK
    net_class: high_speed
    length_match_group: "i2s"
    cross_partition_ok: true
    members: ["U1.45", "U2.15"]
  - name: I2S_LRCK
    net_class: high_speed
    length_match_group: "i2s"
    cross_partition_ok: true
    members: ["U1.46", "U2.13"]
  - name: I2S_SDIN
    net_class: high_speed
    length_match_group: "i2s"
    cross_partition_ok: true
    members: ["U1.47", "U2.12"]
  - name: I2S_SDOUT
    net_class: high_speed
    length_match_group: "i2s"
    cross_partition_ok: true
    members: ["U1.48", "U2.11"]

  # I2C control ─────────────────────────────────────────────────────────
  - name: SDA
    net_class: signal
    cross_partition_ok: true
    members: ["U1.43", "U2.20"]
  - name: SCL
    net_class: signal
    cross_partition_ok: true
    members: ["U1.44", "U2.19"]

constraints:
  - kind: length_match
    targets: ["i2s"]
    tolerance_pct: 5.0
    note: "I2S BCLK/LRCK/SDIN/SDOUT matched ≤5% to keep clock skew negligible"
  - kind: decoupling_within_mm
    targets: ["U1", "U2"]
    value_mm: 2.0
    note: "Bypass caps within 2 mm of supply pins"

fab:
  name: jlcpcb
  layer_count: 4

bom_policy:
  distributors: [jlc, mouser, digikey]
  require_in_stock: true
  prefer_basic_parts: true
