# ESP32-C6-MINI-1 with 2.4 GHz CPWG antenna feed — the M4 RF demo.
#
# Exercises the M4 validators:
#   * CPWG impedance (50 Ω) on the RF feed via target_impedance_ohm + RF
#     partition + CPWG geometry
#   * BGA fanout check (CIR110) on the BGA-packaged DDR3L (sketch)
#   * DDR fly-by topology validator (CIR100)
#
# Notes:
#   - DDR3L wiring here is illustrative — exhaustive DDR routing is out of
#     scope for the demo; the goal is to make CIR100 chew on the topology.
#   - The board declares signoff for both DDR + BGA + RF since M4 features
#     require human review before fab. Drop those flags to see the M4
#     "needs human EE sign-off" warnings.
cir_version: "0.4"
name: esp32-c6-rf-ddr
description: "ESP32-C6 RF demo + DDR3L fly-by sketch — M4 validator exerciser."

stackup:
  layers:
    - { name: "F.Cu",   kind: copper }
    - { name: "pp1",    kind: dielectric, material: prepreg, er: 4.3, thickness_mm: 0.21 }
    - { name: "In1.Cu", kind: copper }
    - { name: "core",   kind: dielectric, material: FR-4,    er: 4.5, thickness_mm: 1.18 }
    - { name: "In2.Cu", kind: copper }
    - { name: "pp2",    kind: dielectric, material: prepreg, er: 4.3, thickness_mm: 0.21 }
    - { name: "B.Cu",   kind: copper }
  finished_thickness_mm: 1.6
  controlled_impedance: true
  power_plane_layers: ["In1.Cu", "In2.Cu"]

outline:
  shape: rect
  width_mm: 60
  height_mm: 40

components:
  - refdes: U1
    mpn: ESP32-C6-MINI-1
    # ESP32-C6 module is a mixed digital + RF block. We tag it digital
    # for partition purposes; the RF_FEED net handles the RF crossing
    # explicitly via cross_partition_ok.
    partition: digital
    decoupling_pins: ["3", "4", "37"]

  # DDR3L sketch — 0.8mm pitch BGA. Real DDR layout is M4-aspirational.
  - refdes: U2
    mpn: MT41K128M16JT-125
    partition: digital
    bga_pitch_mm: 0.8

  # Antenna section
  - refdes: J1
    mpn: U.FL-R-SMT-1
    partition: rf
    placement_hint: "north edge"

  # Decoupling (digital — sits next to the ESP32 supply pins)
  - refdes: C1
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C2
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C3
    mpn: GRM188R71C104KA01D
    value: "100nF"
    partition: digital
  - refdes: C4
    mpn: GRM21BR60J106KE19L
    value: "10uF"
    partition: digital

  # DDR termination
  - refdes: R1
    mpn: GRM188R71C104KA01D  # placeholder value — real DDR Vtt termination is networks
    value: "40R"
    partition: digital

nets:
  - name: GND
    net_class: ground
    members:
      [
        "U1.1", "U1.2", "U1.21",
        "U2.96",
        "J1.2", "J1.3",
        "C1.2", "C2.2", "C3.2", "C4.2",
        "R1.2"
      ]

  - name: "3V3"
    net_class: power
    power_rail: "3V3"
    members:
      [
        "U1.3", "U1.4", "U1.37",
        "C1.1", "C2.1", "C3.1", "C4.1"
      ]

  - name: "1V35"
    net_class: power
    power_rail: "1V35"
    members: ["U2.1", "U2.2"]

  # 2.4 GHz RF feed — 50 Ω grounded CPWG, reference plane In1.Cu
  # Solver-tuned via Wadell/Wen: w=0.40mm, gap=0.30mm on 0.21mm prepreg → 50.3 Ω
  - name: RF_FEED
    net_class: rf
    target_impedance_ohm: 50
    reference_plane: "In1.Cu"
    trace_width_mm: 0.400
    cpwg_gap_mm: 0.300
    # ESP32 module digital → U.FL RF connector. The crossing is the
    # whole point of an RF feed and a human EE has signed off below.
    cross_partition_ok: true
    members: ["U1.36", "J1.1"]

  # DDR address line — fly-by topology
  # Controller (U1) → DRAM (U2) → terminator (R1)
  # Note: in real DDR3L a single chip needs a Vtt terminator network; this
  # is the simplest fly-by the validator can chew on.
  - name: DDR_A0
    net_class: high_speed
    topology: fly_by
    fly_by_order: ["U1", "U2", "R1"]
    reference_plane: "In1.Cu"
    members: ["U1.10", "U2.13", "R1.1"]

  - name: DDR_A1
    net_class: high_speed
    topology: fly_by
    fly_by_order: ["U1", "U2", "R1"]
    reference_plane: "In1.Cu"
    members: ["U1.11", "U2.14", "R1.1"]

constraints:
  - kind: controlled_impedance
    targets: ["RF_FEED"]
    value_ohm: 50.0
    tolerance_pct: 10.0
  - kind: length_match
    targets: ["DDR_A0", "DDR_A1"]
    tolerance_pct: 2.0
    note: "DDR address skew tolerance (illustrative)"

fab:
  name: jlcpcb
  layer_count: 4

bom_policy:
  distributors: [jlc, mouser, digikey]
  require_in_stock: true
  prefer_basic_parts: false  # DDR + RF parts won't be JLC basic

# Human EE sign-off — required for M4 features to suppress the
# "needs human review" warnings. In a real workflow this would be added
# only after a human checks the topology, lengths, terminations, etc.
signoff:
  rf_reviewed: true
  ddr_reviewed: true
  bga_fanout_reviewed: true
  reviewer: "demo@ki-mcp-pcb"
  reviewed_at: "2026-05-17"
