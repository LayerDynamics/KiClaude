# BGA / LGA fanout templates.
#
# Maps ball pitch to recommended via geometry for escape routing. CIR110
# uses this to check that a declared BGA pitch is achievable on the
# current fab target (min trace/space/drill).
#
# Pitch → {via_diameter_mm, via_drill_mm, escape_trace_width_mm,
#          escape_clearance_mm, notes}
#
# Numbers reflect typical JLC / OSHPark capability for 4-layer + 6-layer
# stackups. Tighter pitches (< 0.5mm) need HDI / blind-via processes that
# are NOT supported by base JLC service — those entries flag the fab
# requirement.

"0.4":
  via_diameter_mm: 0.20
  via_drill_mm: 0.10
  escape_trace_width_mm: 0.075
  escape_clearance_mm: 0.075
  requires_hdi: true
  notes: "0.4mm pitch needs HDI / micro-vias. JLC base service can't do this; needs JLC PCBA HDI tier or OSHPark 4-layer service."

"0.5":
  via_diameter_mm: 0.30
  via_drill_mm: 0.15
  escape_trace_width_mm: 0.100
  escape_clearance_mm: 0.100
  requires_hdi: false
  notes: "0.5mm pitch typically routes on 4-layer with 4/4 mil (0.10mm/0.10mm) — at JLC's tighter capability tier."

"0.65":
  via_diameter_mm: 0.40
  via_drill_mm: 0.20
  escape_trace_width_mm: 0.127
  escape_clearance_mm: 0.127
  requires_hdi: false
  notes: "0.65mm pitch fits comfortably with 5/5 mil rules on JLC standard service."

"0.8":
  via_diameter_mm: 0.45
  via_drill_mm: 0.25
  escape_trace_width_mm: 0.150
  escape_clearance_mm: 0.150
  requires_hdi: false
  notes: "0.8mm pitch is the friendliest BGA — fits standard 6/6 mil rules."

"1.0":
  via_diameter_mm: 0.50
  via_drill_mm: 0.30
  escape_trace_width_mm: 0.20
  escape_clearance_mm: 0.20
  requires_hdi: false
  notes: "1.0mm pitch is hobbyist-friendly; any 2- or 4-layer fab handles it."
