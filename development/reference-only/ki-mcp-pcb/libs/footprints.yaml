# Footprint registry — MPN → KiCad symbol + footprint.
#
# This file is the audit boundary for "every MPN must resolve" (CLAUDE.md
# rule #6). Synthesis fails closed if an MPN here isn't present and the
# component didn't supply explicit ``symbol`` + ``footprint`` overrides.
#
# Format:
#   <MPN>:
#     symbol: "LibName:SymbolName"     # KiCad symbol identifier
#     footprint: "LibName:FpName"      # KiCad footprint identifier
#     value: "100nF"                    # optional default value override
#     lcsc: "C1525"                     # optional LCSC part number (for JLC)
#
# Library names assume the user has the KiCad 9 stock libraries installed.
# M2 adds an optional auto-pull from SnapEDA / Ultra Librarian.

