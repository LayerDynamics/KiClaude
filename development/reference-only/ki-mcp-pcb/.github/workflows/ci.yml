name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: lint + test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install workspace
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy packages

      - name: Pytest
        run: uv run pytest

  gui:
    name: GUI (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install workspace
        # `gen:types` shells out to the `ki-mcp-pcb-openapi` console script.
        run: uv sync --all-extras --dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install GUI dependencies
        working-directory: packages/ki_mcp_pcb_gui
        run: npm ci

      - name: Lint
        working-directory: packages/ki_mcp_pcb_gui
        run: npm run lint

      - name: OpenAPI→TS type drift check
        working-directory: packages/ki_mcp_pcb_gui
        run: |
          npm run gen:types
          git diff --exit-code src/api/schema.ts \
            || (echo "src/api/schema.ts is stale — run 'npm run gen:types'" && exit 1)

      - name: Test
        working-directory: packages/ki_mcp_pcb_gui
        run: npm run test

      - name: Build
        working-directory: packages/ki_mcp_pcb_gui
        run: npm run build

  kicad-build:
    name: KiCad end-to-end (real CLI + pcbnew)
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4

      - name: Install KiCad 9 (+ pcbnew Python bindings)
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends kicad
          kicad-cli --version
          # Locate pcbnew so kimp doctor finds it. Apt-installed KiCad
          # exposes pcbnew via the system python3 path on Ubuntu.
          python3 -c "import pcbnew; print('pcbnew', pcbnew.GetBuildVersion())"
          echo "KICAD_PYTHON=$(which python3)" >> $GITHUB_ENV

      - name: Install Freerouting
        run: |
          mkdir -p $HOME/.local/freerouting
          curl -L -o $HOME/.local/freerouting/freerouting.jar \
            https://github.com/freerouting/freerouting/releases/latest/download/freerouting-executable.jar
          echo "FREEROUTING_JAR=$HOME/.local/freerouting/freerouting.jar" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install workspace
        run: uv sync --all-extras --dev

      - name: kimp doctor
        run: uv run kimp doctor

      - name: End-to-end build — text → populated PCB → DRC → fab zip
        run: |
          uv run kimp build examples/blinky.yaml --out build/blinky/ --json | tee build-result.json

          # Project skeleton landed
          test -f build/blinky/blinky-min.kicad_pro
          test -f build/blinky/blinky-min.net
          test -f build/blinky/blinky-min.kicad_pcb

          # Populate stage succeeded
          python3 -c "
          import json, sys
          r = json.load(open('build-result.json'))
          pop = next((s for s in r['stages'] if s['name']=='populate'), None)
          assert pop and pop['ok'], f'populate stage failed: {pop}'
          assert pop['detail']['components_placed'] >= 2, pop['detail']
          print('populate placed', pop['detail']['components_placed'], 'components')
          "

          # Fab zip exists and contains gerbers
          ls build/blinky/fab/
          test -f build/blinky/fab/blinky-min-jlcpcb.zip
          unzip -l build/blinky/fab/blinky-min-jlcpcb.zip

      - name: Run the KiCad-gated end-to-end pytest
        run: |
          uv run pytest tests/test_end_to_end.py::test_real_kicad_end_to_end -v
