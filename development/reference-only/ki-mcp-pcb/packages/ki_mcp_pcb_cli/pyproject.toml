[project]
name = "ki-mcp-pcb-cli"
version = "0.0.1"
description = "kimp — command-line interface for the ki-mcp-pcb pipeline."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "ki-mcp-pcb-core",
    "typer>=0.12",
    "rich>=13.7",
]

[project.scripts]
kimp = "ki_mcp_pcb_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ki_mcp_pcb_cli"]
