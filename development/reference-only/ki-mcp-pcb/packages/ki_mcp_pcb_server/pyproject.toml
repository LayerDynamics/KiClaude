[project]
name = "ki-mcp-pcb-server"
version = "0.0.1"
description = "MCP server for ki-mcp-pcb — exposes the PCB pipeline as tools for Claude Code."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "ki-mcp-pcb-core",
    "mcp[cli]>=1.0",
]

[project.scripts]
ki-mcp-pcb-server = "ki_mcp_pcb_server.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ki_mcp_pcb_server"]
