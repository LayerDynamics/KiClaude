[project]
name = "ki-mcp-pcb-gui"
version = "0.0.1"
description = "Vite + React GUI for ki-mcp-pcb — visual front-end for the text-to-PCB pipeline."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "layerdynamics", email = "layerdynamics@proton.me" }]

# The GUI is a Node/Vite project; the Python side is just the launcher in
# start.py, exposed as a console script so it joins the uv workspace and
# runs the same way as the other packages (`uv run ki-mcp-pcb-gui`).
[project.scripts]
ki-mcp-pcb-gui = "start:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["start.py"]
