[project]
name = "ki-mcp-pcb-core"
version = "0.0.1"
description = "Core library for ki-mcp-pcb: CIR schema, parsers, synthesis, placement, routing, validation, export."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "layerdynamics", email = "layerdynamics@proton.me" }]
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
    "rich>=13.7",
]

[project.optional-dependencies]
kicad = [
    # Pinned loosely for now; tighten when M0 closes.
    "kiutils>=1.4",
]
ipc = [
    # kicad-python (kipy) — official KiCad 9 IPC bindings. Optional
    # because it requires a running KiCad instance and platform-specific
    # deps. Enables the `KipyPlacer` auto-place path.
    "kicad-python>=0.3",
]
synthesis = [
    # "skidl>=2.0",
    # "atopile>=0.3",
]
llm = [
    # Powers parsers/nl.py — natural language → CIR via Claude.
    "anthropic>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ki_mcp_pcb_core"]
