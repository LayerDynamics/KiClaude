# Adafruit Trinket M0 (SAMD21, USB micro-B, 5 GPIO)
#
# Smaller than the Pico — exercises a different MCU family.
cir_version: "0.1"
name: trinket-m0-demo
description: "Adafruit Trinket M0, simplified."

components:
  - refdes: U1
    mpn: ATSAMD21E18A-AU
  - refdes: U2
    mpn: NCP1117ST33T3G
  - refdes: J1
    mpn: 10118194-0001LF
    value: "USB micro-B"
  - refdes: C1
    mpn: GRM188R71C104KA01D
    value: "100nF"
  - refdes: C2
    mpn: GRM21BR60J106KE19L
    value: "10uF"
  - refdes: D1
    mpn: 19-217/R6C-AL1M2VY/3T
    value: "status LED"

nets:
  - name: GND
    net_class: ground
    members: ["U1.7", "U2.1", "J1.5", "C1.2", "C2.2", "D1.2"]
  - name: "3V3"
    net_class: power
    members: ["U1.4", "U2.3", "C1.1", "C2.1"]
  - name: VBUS
    net_class: power
    members: ["J1.1", "U2.2"]
  - name: USB_DP
    net_class: differential
    # TODO M3 — declare target_impedance_ohm: 90 once impedance solver exists
    members: ["U1.25", "J1.3"]
  - name: USB_DM
    net_class: differential
    members: ["U1.24", "J1.2"]
  - name: STATUS
    net_class: signal
    members: ["U1.20", "D1.1"]

fab:
  name: jlcpcb
  layer_count: 2
