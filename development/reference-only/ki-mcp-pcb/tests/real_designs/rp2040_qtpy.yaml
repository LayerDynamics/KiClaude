# Adafruit QT Py — RP2040 (simplified, demo-only)
#
# Real Adafruit reference design schematic boiled down to the CIR primitives
# the M0 validator can chew on. Not a 1:1 reproduction — meant to exercise
# component/net diversity, not to be a fab-ready file.
cir_version: "0.1"
name: rp2040-qtpy-demo
description: "Adafruit QT Py RP2040, simplified."

components:
  - refdes: U1
    mpn: RP2040
    value: "MCU"
  - refdes: U2
    mpn: W25Q128JVSIQ
    value: "16MB QSPI flash"
  - refdes: U3
    mpn: AP2112K-3.3
    value: "3.3V LDO"
  - refdes: J1
    mpn: USB4105-GF-A
    value: "USB-C"
  - refdes: Y1
    mpn: ABM8-12.000MHZ-B2T
    value: "12 MHz xtal"
  - refdes: C1
    mpn: GRM188R71C104KA01D
    value: "100nF"
  - refdes: C2
    mpn: GRM188R71C104KA01D
    value: "100nF"
  - refdes: C3
    mpn: GRM21BR60J106KE19L
    value: "10uF"
  - refdes: D1
    mpn: 19-217/R6C-AL1M2VY/3T
    value: "NeoPixel"
  - refdes: SW1
    mpn: EVQ-Q2P03W
    value: "boot/reset"

nets:
  - name: GND
    net_class: ground
    members: ["U1.19", "U2.4", "U3.1", "J1.1", "C1.2", "C2.2", "C3.2", "D1.4", "SW1.2"]
  - name: "3V3"
    net_class: power
    members: ["U1.43", "U2.8", "U3.3", "C2.1", "C3.1"]
  - name: VBUS
    net_class: power
    members: ["J1.4", "U3.2"]
  - name: USB_DP
    net_class: differential
    members: ["U1.47", "J1.2"]
  - name: USB_DM
    net_class: differential
    members: ["U1.46", "J1.3"]
  - name: XTAL1
    net_class: signal
    members: ["U1.20", "Y1.1"]
  - name: XTAL2
    net_class: signal
    members: ["U1.21", "Y1.3"]
  - name: NEOPIXEL_DIN
    net_class: signal
    members: ["U1.27", "D1.1"]

fab:
  name: jlcpcb
  layer_count: 2

bom_policy:
  distributors: [jlc, digikey, mouser]
  require_in_stock: true
  prefer_basic_parts: true
