name: license

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license:
    name: license audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # client's file:../crates/*/pkg deps require the wasm packages to exist
      # before pnpm install can resolve the workspace.
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: wasm-pack build (ki)
        run: wasm-pack build --target web crates/ki -- --features wasm-api
      - name: wasm-pack build (cad)
        run: wasm-pack build --target web crates/cad

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Run kiclaude license_audit.sh
        run: bash scripts/license_audit.sh
