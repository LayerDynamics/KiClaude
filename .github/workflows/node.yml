name: node

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: node (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: pnpm -r typecheck
        run: pnpm -r typecheck

      - name: pnpm -r test
        run: pnpm -r test

      - name: pnpm -r build
        run: pnpm -r build
